<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#0f0f0f;color:#fff}
.container{display:grid;grid-template-columns:1fr 1fr;gap:40px;padding:40px}
img{width:100%;border-radius:10px}
h1{font-size:30px}
.price{color:#ff8c00;font-size:28px;margin:15px 0}
.badge{background:#ff8c00;color:#000;padding:5px 10px;border-radius:5px;font-size:12px}
.box{margin-top:20px;background:#1a1a1a;padding:15px;border-radius:10px}
select,input{width:100%;padding:10px;margin:10px 0;border-radius:5px;border:none}
button{width:100%;padding:15px;background:#ff8c00;border:none;color:#000;font-weight:bold;cursor:pointer;border-radius:8px}
ul{padding-left:20px}
</style>
</head>

<body>

<div class="container" id="page"></div>

<script>
const item = JSON.parse(localStorage.getItem("selectedItem"));

// SAFE BACKEND
function backend(name){
name = name.toLowerCase();

if(name.includes("buds")){
return {
type:"Premium Audio Device",
condition:"New 10/10",
battery:"6-10 Hours Backup",
warranty:"6 Months Warranty",
features:["Hi-Fi Sound","Noise Cancellation","Bluetooth 5.3"],
trust:["Top Selling","Verified Quality"],
box:["Charging Case","Cable"],
price:"3000 - 5500 PKR"
}
}

if(name.includes("charger")){
return {
type:"Fast Charger",
condition:"New 10/10",
warranty:"3 Months",
features:["Fast Charging","Protection","Durable"],
trust:["Safe Product"],
box:["Charger","Cable"],
price:"900 - 2200 PKR"
}
}

if(name.includes("battery")){
return {
type:"Battery Service",
condition:"Installed New",
warranty:"1 Month",
features:["Long Backup","Safe Install"],
trust:["Expert Work"],
box:["Battery","Report"],
price:"1200 - 3500 PKR"
}
}

if(name.includes("screen")){
return {
type:"Screen Repair",
condition:"Professional Fix",
warranty:"2 Months",
features:["Original Display","Smooth Touch"],
trust:["Skilled Technician"],
box:["Screen","Report"],
price:"2500 - 6000 PKR"
}
}

return {
type:"General Product",
condition:"Good 9/10",
warranty:"Depends",
features:["Good Quality","Durable"],
trust:["Trusted Store"],
box:["Standard Package"],
price:"Market Price"
}
}

const b = backend(item.name);

document.getElementById("page").innerHTML = `
<div>
  <img src="${item.img}">
</div>

<div>
  <p>HOME / ${item.name.toUpperCase()}</p>

  <h1>${item.name}</h1>

  <p>Condition: ${b.condition}</p>
  <p class="badge">${b.type}</p>

  <div class="price">${b.price}</div>

  <div class="box">
    <h3>Options</h3>

    <select>
      <option>64GB</option>
      <option>128GB</option>
      <option>256GB</option>
    </select>

    <input type="number" value="1" min="1">
  </div>

  <div class="box">
    <h3>Features</h3>
    <ul>${b.features.map(f=>`<li>${f}</li>`).join('')}</ul>
  </div>

  <div class="box">
    <h3>Box Items</h3>
    <ul>${b.box.map(bx=>`<li>${bx}</li>`).join('')}</ul>
  </div>

  <div class="box">
    <h3>Trust</h3>
    <ul>${b.trust.map(t=>`<li>${t}</li>`).join('')}</ul>
  </div>

  <button onclick="addToCart()">Add to Cart</button>
</div>
`;

// FIXED CART FUNCTION
function addToCart(){

let item = JSON.parse(localStorage.getItem("selectedItem"));

if(!item){
alert("No product selected");
return;
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let existing = cart.find(i => i.name === item.name);

let price = item.yourPrice || item.price || 1000;

if(existing){
existing.qty += 1;
}else{
cart.push({
name: item.name,
price: price,
img: item.img,
qty: 1
});
}

localStorage.setItem("cart", JSON.stringify(cart));
alert("Added to cart!");
}
</script>

</body>
</html>
